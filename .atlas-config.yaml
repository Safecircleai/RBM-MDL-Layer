# Atlas status configuration for RBM-MDL-Layer.
# Metadata only — how the ecosystem intelligence layer (Atlas-Sync) sees this node.
# This is ecosystem registration, not implementation.

name: RBM MDL Layer
atlas_id: rbm-mdl-layer
repository: safecircleai/RBM-MDL-Layer
owner: SafeCircle AI
layer: Infrastructure
classification: Governance Infrastructure (Constitutional Node — Mandate Definition Layer)
node_type: governance-infrastructure
constitutional_owner: RBM
operational_status: Foundational (constitution ratified 2026-07-14; pre-implementation)
readiness: 5

purpose: >-
  The constitutional Mandate Domain of the RBM ecosystem: the single authoritative
  owner of resolved-mandate truth. It compiles authored obligations (regulatory,
  contractual, organizational, operational) into structured, versioned mandates and
  deterministically resolves and determines which apply to any entity, in any
  jurisdiction, at any time — with immutable snapshots as the audit artifact. It owns
  the determination; it does not author the source law, execute the business or
  economic act, or supervise the ecosystem. Not the CFRS implementation, and not
  hosted inside EchoForge. This repository currently contains doctrine only.

# This node is an independent infrastructure node: it has no constitutional dependency
# on any other repository, runtime, or assistant. Every other system is a consumer of
# its doctrine (see MDL_Consumer_Model.md), never a parent.
constitutional_dependencies: []

operational_dependencies: []   # none yet — no implementation in the constitutional phase

# The uploaded operational specs this doctrine governs and remains consistent with
# (not owned here; consistency-reconciliation in Open_Questions_and_Risks.md Part A).
governed_operational_specs:
  - Mandate Definition Layer Specification v1.0
  - MDL <-> EchoForge Service Contract v1
  - Jurisdiction Stack Model v1.0

consumer_roles:                # who consumes this node (roles, not named runtimes)
